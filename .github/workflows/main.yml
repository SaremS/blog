name: Render and deploy
on:
  workflow_dispatch:
  push:
    branches:
    - master

jobs:
  quarto-render-and-push:
    name: Render
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2.5.0 # Checking out the repo
    
    - name: Set up
      uses: quarto-dev/quarto-actions/setup@v2
      
    - name: Render
      uses: quarto-dev/quarto-actions/render@v2
      
    - name: Build and Publish latest Docker image
      uses: VaultVulp/gp-docker-action@1.5.0
      with:
        github-token: ${{ secrets.PUSH_IMAGE_KEY }}     
        image-name: blog
        build-context: .
        dockerfile: ./Dockerfile    
  deploy:
      name: Deploy
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/master'
      needs: quarto-render-and-push
      steps:
      - name: executing remote ssh commands using password
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd blog
            docker stack rm blog
            docker-compose pull
            sleep 10
            docker stack up -c docker-compose.yml blog
